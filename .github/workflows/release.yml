name: Release
on:
  push:
    branches:
      - master

# Serialize releases on the same ref so two pushes to master cannot race the
# semantic-release tag/version state. We do NOT cancel-in-progress: a release
# must always finish (tag + publish) before the next attempt starts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  # Required for cosign keyless signing via the GitHub Actions OIDC token.
  # Sigstore exchanges this for a short-lived signing certificate; no
  # long-lived signing keys are stored in the repo.
  id-token: write

# Supply-chain hardening: cosign keyless signing of published OCI images is
# wired in below. SBOM generation + cosign attestation now runs after signing
# via anchore/sbom-action; see the "Generate SBOM" and "Attest SBOM" steps.

defaults:
  run:
    working-directory: ./

jobs:
  publish-package:
    name: semantic-release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semantic-release.outputs.new-release-published }}
      version: ${{ steps.semantic-release.outputs.new-release-version }}
      major: ${{ steps.semantic-release.outputs.new-release-major-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 'lts/*'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: release

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # TODO(supply-chain): mridang/action-semantic-release is a single-maintainer
      # action. Migrate to cycjimmy/semantic-release-action (multi-maintainer,
      # better audit posture) once configuration parity is verified.
      - name: Run semantic-release
        id: semantic-release
        uses: mridang/action-semantic-release@c8f803e07a9e6b6329d34329da07c1df9fa72753  # v2.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Cosign keyless signing of the just-pushed image. We only sign when a
      # release was actually cut. Each tag listed in .releaserc.json
      # (`latest`, `{{major}}`, `{{version}}`) is signed; `cosign sign` resolves
      # each tag to its digest and signs the digest, so the tag re-pointing
      # later cannot invalidate the signature retroactively.
      - name: Install cosign
        if: steps.semantic-release.outputs.new-release-published == 'true'
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a  # v3.8.1

      - name: Sign published OCI images with cosign
        if: steps.semantic-release.outputs.new-release-published == 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE: docker.io/mridang/chasm
          VERSION: ${{ steps.semantic-release.outputs.new-release-version }}
          MAJOR: ${{ steps.semantic-release.outputs.new-release-major-version }}
        run: |
          set -euo pipefail
          for tag in "${VERSION}" "${MAJOR}" "latest"; do
            echo "Signing ${IMAGE}:${tag}"
            cosign sign --yes "${IMAGE}:${tag}"
          done

      # Install syft via anchore/sbom-action so the subsequent shell step can
      # invoke `syft` directly per-tag. SHA-pinned to v0.17.9; bump by looking
      # up the latest release at https://github.com/anchore/sbom-action/releases
      # and replacing both the SHA and the version comment.
      - name: Install syft (SBOM generator)
        if: steps.semantic-release.outputs.new-release-published == 'true'
        uses: anchore/sbom-action/download-syft@61119d458adab75f756bc0b9e4bde25725f86a7a  # v0.17.9

      # Generate an SPDX-JSON SBOM for each published tag and attest it against
      # the image digest with cosign. `cosign attest` resolves the tag to its
      # digest before signing, so the attestation binds to the immutable
      # content even if the tag is later re-pointed. Same OIDC identity used
      # for keyless image signing above; no long-lived signing keys.
      - name: Generate + attest SBOMs with cosign
        if: steps.semantic-release.outputs.new-release-published == 'true'
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE: docker.io/mridang/chasm
          VERSION: ${{ steps.semantic-release.outputs.new-release-version }}
          MAJOR: ${{ steps.semantic-release.outputs.new-release-major-version }}
        run: |
          set -euo pipefail
          for tag in "${VERSION}" "${MAJOR}" "latest"; do
            echo "Generating SBOM for ${IMAGE}:${tag}"
            syft "${IMAGE}:${tag}" -o spdx-json="sbom-${tag}.json"
            echo "Attesting SBOM for ${IMAGE}:${tag}"
            cosign attest --yes --predicate "sbom-${tag}.json" --type spdx "${IMAGE}:${tag}"
          done
