name: MSRV

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: msrv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    name: Build on MSRV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup Rust (MSRV)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: "1.75"

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: msrv

      - name: Check workspace on MSRV
        # `cargo check` catches dependency-MSRV regressions earlier than `build`
        # and runs faster on CI; pair it with `build` so codegen issues are
        # still surfaced.
        run: cargo check --workspace --exclude chasm-wasm --locked

      - name: Build workspace on MSRV
        run: cargo build --workspace --exclude chasm-wasm --locked
